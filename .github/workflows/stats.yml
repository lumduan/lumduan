name: Refresh profile stats

# Regenerates the candy-themed stats.svg + languages.svg committed to this repo,
# so the profile README shows live stats with zero external/third-party dependency.
on:
  schedule:
    - cron: "17 3 * * *"   # daily ~03:17 UTC (off-minute, off the :00 fleet)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-stats
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_LOGIN: lumduan
        run: python .github/scripts/gen_stats.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.svg assets/languages.svg
          if git diff --cached --quiet; then
            echo "no change — skipping commit"
          else
            git commit -m "chore: refresh profile stats SVGs"
            git push
          fi
